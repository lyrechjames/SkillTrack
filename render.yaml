services:
  - type: web
    name: skilltrack
    runtime: python
    # Render must migrate the external database before gunicorn handles
    # requests. This prevents the registration/login 500 caused by missing
    # Django tables.
    buildCommand: bash build.sh
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: SECURE_SSL_REDIRECT
        value: True
      - key: ALLOWED_HOSTS
        value: skilltrack-7cin.onrender.com,localhost,127.0.0.1
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /
